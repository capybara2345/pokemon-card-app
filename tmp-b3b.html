{"content":{"rendered":"\n<ul class=\"wp-block-list\">\n<li><strong>Release Date:<\/strong>&nbsp;June 30, 2026 at 01:00 AM UTC<\/li>\n\n\n\n<li><strong>Set Code:<\/strong> B3b<\/li>\n<\/ul>\n\n\n\n<figure class=\"wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio\"><div class=\"wp-block-embed__wrapper\">\n<iframe loading=\"lazy\" title=\"Pok\u00e9mon TCG Pocket: Everyday Wonders | Official Trailer\" width=\"1290\" height=\"726\" src=\"https:\/\/www.youtube.com\/embed\/RGQsfOxyL9E?feature=oembed\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen><\/iframe>\n<\/div><\/figure>\n\n\n\n<p class=\"wp-block-paragraph\">The new Everyday Wonders themed booster packs will be added to the lineup on Tuesday, June 30.<br>Everyday Wonders features Pikachu, Piplup, and Snorlax, which are depicted on the packaging, and more! This expansion contains many cards focused on all sorts of cute and charming aspects of Pok\u00e9mon.<br>We hope you enjoy an even broader Pok\u00e9mon TCG collecting experience through this diverse array of adorable cards, including colorful and fun illustrations.<\/p>\n\n\n\n<h2 class=\"wp-block-heading\">Event Period<\/h2>\n\n\n\n<ul class=\"wp-block-list\">\n<li><strong>Start:<\/strong>&nbsp;June 30 2026 at 01:00 AM UTC<\/li>\n<\/ul>\n\n\n\n\t\t<div class=\"wp-block-getwid-countdown has-inner-paddings-small has-spacing-small\">\n\t\t\t<div class=\"wp-block-getwid-countdown__wrapper\" >\n\t\t\t\t<div class=\"wp-block-getwid-countdown__content\"\n\t\t\t\t\t data-datetime=\"negative\"     data-days=\"1\" data-hours=\"1\" data-minutes=\"1\" data-seconds=\"1\">\n\t\t\t\t<\/div>\n\t\t\t<\/div>\n\t\t<\/div>\n\n\t\t\n\n\n<h2 class=\"wp-block-heading\">Booster Pack<\/h2>\n\n\n\n<figure class=\"wp-block-image size-large is-resized\"><img loading=\"lazy\" decoding Everyday_Wonders_Sylveon_EN-215x300.png 215w\" sizes=\"auto, (max-width: 734px) 100vw, 734px\" \/><\/figure>\n\n\n\n<figure class=\"wp-block-image size-large\"><img loading=\"lazy\" decoding=\"async\" width=\"734\" height=\"1024\" data-id=\"11873\" src=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/Pokemon_TCG_Pocket_Everyday_Wonders_Pikachu_EN.png\" alt=\"\" class=\"wp-image-11873\" srcset=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/Pokemon_TCG_Pocket_Everyday_Wonders_Pikachu_EN.png 734w, https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/Pokemon_TCG_Pocket_Everyday_Wonders_Pikachu_EN-215x300.png 215w\" sizes=\"auto, (max-width: 734px) 100vw, 734px\" \/><\/figure>\n\n\n\n<figure class=\"wp-block-image size-large\"><img loading=\"lazy\" decoding=\"async\" width=\"734\" height=\"1024\" data-id=\"11874\" src=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/Pokemon_TCG_Pocket_Everyday_Wonders_Piplup_EN.png\" alt=\"\" class=\"wp-image-11874\" srcset=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/Pokemon_TCG_Pocket_Everyday_Wonders_Piplup_EN.png 734w, https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/Pokemon_TCG_Pocket_Everyday_Wonders_Piplup_EN-215x300.png 215w\" sizes=\"auto, (max-width: 734px) 100vw, 734px\" \/><\/figure>\n<\/figure>\n\n\n\n<h2 class=\"wp-block-heading\">Upcoming Events<\/h2>\n\n\n\n<p class=\"wp-block-paragraph\">A variety of events will be available throughout July to help you sharpen your skills and expand your collection.<\/p>\n\n\n\n<p class=\"wp-block-paragraph\"><strong>Early to mid-July:\u00a0<\/strong>Take on other players in the\u00a0<em>Everyday Wonders<\/em>\u00a0Emblem Event! You can earn emblems based on how many battles you win and complete missions to earn shinedust and other helpful items.<\/p>\n\n\n\n<figure class=\"wp-block-image size-full\"><img loading=\"lazy\" decoding=\"async\" width=\"750\" height=\"243\" src=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/everyday-wonders-emblem-event.width-750.png\" alt=\"\" class=\"wp-image-11894\" srcset=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/everyday-wonders-emblem-event.width-750.png 750w, https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/everyday-wonders-emblem-event.width-750-300x97.png 300w\" sizes=\"auto, (max-width: 750px) 100vw, 750px\" \/><\/figure>\n\n\n\n<p class=\"wp-block-paragraph\"><strong>Mid-July:\u00a0<\/strong>During the Community Week event, special missions will be available where you can trade and share cards to obtain trade hourglasses, special accessories, and other rewards.<\/p>\n\n\n\n<figure class=\"wp-block-image size-full\"><img loading=\"lazy\" decoding=\"async\" width=\"750\" height=\"243\" src=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/bonus-week-missions.width-750-2-1.png\" alt=\"\" class=\"wp-image-11896\" srcset=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/bonus-week-missions.width-750-2-1.png 750w, https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/bonus-week-missions.width-750-2-1-300x97.png 300w\" sizes=\"auto, (max-width: 750px) 100vw, 750px\" \/><\/figure>\n\n\n\n<p class=\"wp-block-paragraph\"><strong>Mid- to late July:\u00a0<\/strong>By winning special solo battles, you can score B series vol. 10 promo packs featuring Hisuian Zorua during the Hisuian Zorua Drop Event. You can also obtain Growlithe and Emolga cards during a wonder pick event!<\/p>\n\n\n\n<figure class=\"wp-block-image size-full\"><img loading=\"lazy\" decoding=\"async\" width=\"750\" height=\"243\" src=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/hisuian-zoroa-drop-event.width-750-1.png\" alt=\"\" class=\"wp-image-11897\" srcset=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/hisuian-zoroa-drop-event.width-750-1.png 750w, https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/hisuian-zoroa-drop-event.width-750-1-300x97.png 300w\" sizes=\"auto, (max-width: 750px) 100vw, 750px\" \/><\/figure>\n\n\n\n<figure class=\"wp-block-image size-full\"><img loading=\"lazy\" decoding=\"async\" width=\"750\" height=\"243\" src=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/growlithe-emolga-wonder-pick-event.width-750-1.png\" alt=\"\" class=\"wp-image-11898\" srcset=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/growlithe-emolga-wonder-pick-event.width-750-1.png 750w, https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/growlithe-emolga-wonder-pick-event.width-750-1-300x97.png 300w\" sizes=\"auto, (max-width: 750px) 100vw, 750px\" \/><\/figure>\n\n\n\n<h2 class=\"wp-block-heading\">Accessories<\/h2>\n\n\n\n<figure class=\"wp-block-image size-full\"><img loading=\"lazy\" decoding=\"async\" width=\"853\" height=\"720\" src=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/cards-cosmetics-for-julys-drop-event-and-wonder-pick-event-v0-kkv5t265i89h1.webp\" alt=\"\" class=\"wp-image-11899\" srcset=\"https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/cards-cosmetics-for-julys-drop-event-and-wonder-pick-event-v0-kkv5t265i89h1.webp 853w, https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/cards-cosmetics-for-julys-drop-event-and-wonder-pick-event-v0-kkv5t265i89h1-300x253.webp 300w, https:\/\/ptcgpocket.gg\/wp-content\/uploads\/sites\/51\/2026\/06\/cards-cosmetics-for-julys-drop-event-and-wonder-pick-event-v0-kkv5t265i89h1-768x648.webp 768w\" sizes=\"auto, (max-width: 853px) 100vw, 853px\" \/><\/figure>\n"}}
